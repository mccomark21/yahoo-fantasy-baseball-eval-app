name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Tuesdays at 13:00 UTC. The MLB season (Apr–Oct) is entirely on EDT, so this
    # lands at 9:00 AM ET every in-season refresh; off-season it drifts to 8:00 AM
    # EST, which is harmless. Refreshes every ranking source in one build
    # (RANKING_REFRESH_TARGET=all); the relief- and CBS-only workflows were retired.
    - cron: '0 13 * * 2'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-starter
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Gate the deploy: a parser/type regression or failing test must not ship to Pages.
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

      - run: npm run build
        env:
          RANKING_REFRESH_TARGET: all

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
